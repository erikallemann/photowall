<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Photos</title>
<link rel="stylesheet" href="{{ url_for('static', filename='static/upload_disabled.css') }}"></head>
<body>
<main>
  <header>
    <h1>Photowall</h1>
    <nav><a href="/wall">Wall</a></nav>
  </header>
  <div class="note">
    <strong>Uploads are closed.</strong>
    <p>You can still view the wall and download all photos as a ZIP archive.</p>
    <p class="muted">{{ source_note|safe }}</p>
    <div class="actions">
      <a class="btn" href="/wall">Open the photo wall</a>
      <a class="btn" href="/slideshow">Start slideshow</a>
      {% if show_download %}<a class="btn" href="/download">Download ZIP</a>{% endif %}
    </div>
  </div>
</main>
</body></html>
